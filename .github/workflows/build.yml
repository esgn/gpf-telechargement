name: build-index

on:
  schedule:
    # Tous les 3 jours à 02:00 : rebuild complet du site (jours 1,4,7…,31 ; l'écart
    # peut être plus court en fin de mois). Cadence réduite pour économiser les
    # minutes de build GitHub Actions.
    - cron: "0 2 */3 * *"
      timezone: "Europe/Paris"
  workflow_dispatch:
    inputs:
      workers:
        description: "Nombre de requêtes de crawl en parallèle"
        required: false
        default: "8"
      requests_per_second:
        description: "Débit visé (requêtes par seconde)"
        required: false
        default: "8"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7          # code + catalogue.json (aucune donnée)

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # Aucun `pip install` : le projet n'utilise que la bibliothèque standard.

      - name: Install WireGuard
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -o DPkg::Lock::Timeout=300
          sudo apt-get install -y -o DPkg::Lock::Timeout=300 wireguard-tools

      - name: IP GitHub de référence (avant tunnel)
        run: echo "GH_IP=$(curl --fail --silent --show-error https://api.ipify.org || true)" >> "$GITHUB_ENV"

      - name: Start VPN tunnel
        env:
          PR_WG_CFG: ${{ secrets.PR_WG_CFG }}
        run: |
          echo "$PR_WG_CFG" \
            | base64 --decode \
            | sudo tee /etc/wireguard/pr.conf > /dev/null
          sudo chmod 600 /etc/wireguard/pr.conf
          sudo wg-quick up pr

      - name: Vérifier que le tunnel a pris (garde-fou anti-fuite)
        run: |
          IP="$(curl --fail --silent --show-error https://api.ipify.org || true)"
          echo "IP avant tunnel : ${GH_IP:-<indisponible>}"
          echo "IP après tunnel : ${IP:-<indisponible>}"
          if [ -z "$IP" ] || [ "$IP" = "$GH_IP" ]; then
            echo "::error::L'IP de sortie n'a pas changé : le tunnel WireGuard n'a pas pris. Build stoppé pour ne pas crawler GPF depuis l'IP GitHub partagée." >&2
            exit 1
          fi
          echo "Tunnel actif : sortie via $IP."

      - name: Tests (fonctions pures, sans réseau)
        run: python -m unittest

      - name: Dérive catalogue ↔ API (informatif, n'échoue pas le build)
        run: python build.py --check || true

      - name: Générer le site (rebuild complet)
        run: >
          python build.py --out site
          --workers ${{ inputs.workers || '8' }}
          --requests-per-second ${{ inputs.requests_per_second || '8' }}

      - name: Couper le tunnel (avant upload GitHub)
        run: sudo wg-quick down pr || true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      # Filet de sécurité : coupe le tunnel même si un step précédent a échoué avant
      # le teardown normal ci-dessus (idempotent, d'où le « || true »).
      - name: Couper le tunnel (filet de sécurité)
        if: always()
        run: sudo wg-quick down pr || true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
