name: build-index

on:
  schedule:
    # Tous les 3 jours à 02:00 : rebuild complet du site (jours 1,4,7…,31 ; l'écart
    # peut être plus court en fin de mois). Cadence réduite pour économiser les
    # minutes de build GitHub Actions.
    - cron: "0 2 */3 * *"
      timezone: "Europe/Paris"
  workflow_dispatch:
    inputs:
      workers:
        description: "Nombre de requêtes de crawl en parallèle"
        required: false
        default: "8"
      requests_per_second:
        description: "Débit visé (requêtes par seconde)"
        required: false
        default: "8"

permissions:
  contents: read      # requis par actions/checkout (sinon "repository not found" sur repo privé)
  pages: write
  id-token: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5          # code + catalogue.json (aucune donnée)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Aucun `pip install` : le projet n'utilise que la bibliothèque standard.

      - name: Tests (fonctions pures, sans réseau)
        run: python -m unittest

      - name: Dérive catalogue ↔ API (informatif, n'échoue pas le build)
        run: python build.py --check || true

      - name: Générer le site (rebuild complet)
        # Sur le run planifié, inputs.* est vide → fallback sur les défauts (8 / 8).
        run: >
          python build.py --out site
          --workers ${{ inputs.workers || '8' }}
          --requests-per-second ${{ inputs.requests_per_second || '8' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
