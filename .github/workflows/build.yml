name: build-index

on:
  schedule:
    - cron: "0 2 * * *"
      timezone: "Europe/Paris"
  workflow_dispatch:
    inputs:
      workers:
        description: "Nombre de requêtes de crawl en parallèle"
        required: false
        default: "8"
      requests_per_second:
        description: "Débit visé (requêtes par seconde)"
        required: false
        default: "8"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: build-index
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7          # code + catalogue.json (aucune donnée)

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          # Aucun `pip install` : le projet n'utilise que la bibliothèque standard.

      - name: Install WireGuard
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -o DPkg::Lock::Timeout=300
          sudo apt-get install -y -o DPkg::Lock::Timeout=300 wireguard-tools

      - name: Résoudre l'IP de data.geopf.fr
        run: |
          IPS=""
          for _ in 1 2 3 4 5; do
            IPS="$(python3 -c 'import socket; print(",".join(ip+"/32" for ip in sorted({a[4][0] for a in socket.getaddrinfo("data.geopf.fr",443,socket.AF_INET)})))' 2>/dev/null || true)"
            if [ -n "$IPS" ]; then break; fi
            sleep 2
          done
          if [ -z "$IPS" ]; then
            echo "::error::Résolution de data.geopf.fr impossible (aucune adresse)." >&2
            exit 1
          fi
          echo "data.geopf.fr -> $IPS"
          echo "GPF_ALLOWED_IPS=$IPS" >> "$GITHUB_ENV"

      - name: Start VPN tunnel
        env:
          PR_WG_CFG: ${{ secrets.PR_WG_CFG }}
        run: |
          # On patche la conf wireguard pour forcer le split tunnelling:
          #  - toute ligne « DNS = » est supprimée pour garder le DNS du runner
          #  - « AllowedIPs » est forcé aux IPs de data.geopf.fr résolues plus haut
          echo "$PR_WG_CFG" \
            | base64 --decode \
            | sed -E "/^[[:space:]]*DNS[[:space:]]*=/Id; s#^[[:space:]]*AllowedIPs[[:space:]]*=.*#AllowedIPs = ${GPF_ALLOWED_IPS}#I" \
            | sudo tee /etc/wireguard/pr.conf > /dev/null
          sudo chmod 600 /etc/wireguard/pr.conf
          echo "AllowedIPs : $(sudo grep -E '^AllowedIPs = ' /etc/wireguard/pr.conf || echo ABSENT)"
          echo "Lignes DNS restantes : $(sudo grep -ciE '^[[:space:]]*DNS[[:space:]]*=' /etc/wireguard/pr.conf)"
          if ! sudo grep -qxF "AllowedIPs = ${GPF_ALLOWED_IPS}" /etc/wireguard/pr.conf; then
            echo "::error::AllowedIPs n'a pas pu être forcé (conf inattendue)." >&2
            exit 1
          fi
          sudo wg-quick up pr

      - name: Vérifier que GPF sort par le tunnel (garde-fou anti-fuite)
        run: |
          echo "AllowedIPs GPF : $GPF_ALLOWED_IPS"
          fail=0
          IFS=',' read -ra CIDRS <<< "$GPF_ALLOWED_IPS"
          for cidr in "${CIDRS[@]}"; do
            ip="${cidr%/*}"
            dev="$(ip route get "$ip" 2>/dev/null | sed -n 's/.* dev \([^ ]*\).*/\1/p' | head -n1)"
            echo "  $ip -> interface ${dev:-<inconnue>}"
            [ "$dev" = "pr" ] || fail=1
          done
          if [ "$fail" != 0 ]; then
            echo "::error::Au moins une IP GPF ne sort pas par le tunnel (pr). Build stoppé pour ne pas crawler depuis l'IP GitHub partagée." >&2
            exit 1
          fi
          echo "OK : tout GPF routé via le tunnel WireGuard (pr)."

      - name: Tests (fonctions pures, sans réseau)
        run: python -m unittest

      - name: Dérive catalogue ↔ API (informatif, n'échoue pas le build)
        run: python build.py --check || true

      - name: Générer le site (rebuild complet)
        run: >
          python build.py --out site
          --workers ${{ inputs.workers || '8' }}
          --requests-per-second ${{ inputs.requests_per_second || '8' }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Couper le tunnel VPN
        if: always()
        run: sudo wg-quick down pr || true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
